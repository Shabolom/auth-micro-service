version: '3.9'
name: Auth_service

services:
  postgres:
    image: postgres:16
    container_name: auth-micro-service-postgres
    restart: always
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
